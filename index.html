<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amilin Store | Digital Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Background Glow */
        .bg-glow { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, #002b2e 0%, #050505 80%); z-index: -1; }

        .container { width: 90%; max-width: 400px; text-align: center; z-index: 1; }
        
        .profile-img { 
            width: 100px; height: 100px; border-radius: 50%; 
            border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary);
            margin-bottom: 10px; object-fit: cover;
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 25px; }

        .link-wrapper { display: flex; flex-direction: column; gap: 12px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            transition: 0.3s ease;
        }

        .glass-card:hover { 
            background: rgba(0, 242, 254, 0.1); 
            transform: scale(1.03); 
            border-color: var(--primary); 
        }

        .icon-small { 
            width: 40px; height: 40px; border-radius: 50%; 
            margin-right: 15px; border: 1.5px solid var(--primary); 
        }

        .text-box h3 { font-size: 1rem; font-weight: 600; text-transform: uppercase; }

        .footer { margin-top: 30px; font-size: 10px; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <img src="https://c.termai.cc/i111/7DvQODC.png" alt="Amilin" class="profile-img">
        <h1>AMILIN STORE</h1>

        <div class="link-wrapper">
            <a href="https://chat.whatsapp.com/F4T8cvxOQ9NAUTd28qXi0j" class="glass-card" target="_blank">
                <img src="https://c.termai.cc/i111/7DvQODC.png" class="icon-small">
                <div class="text-box"><h3>LINK GB JB</h3></div>
            </a>

            <a href="https://whatsapp.com/channel/0029VbBx0usFHWpwrDUEuI02" class="glass-card" target="_blank">
                <img src="https://c.termai.cc/i111/7DvQODC.png" class="icon-small">
                <div class="text-box"><h3>SALURAN WA 1</h3></div>
            </a>

            <a href="https://whatsapp.com/channel/0029Vb7M4W3BlHpWbLLViM3O" class="glass-card" target="_blank">
                <img src="https://c.termai.cc/i111/7DvQODC.png" class="icon-small">
                <div class="text-box"><h3>SALURAN WA 2</h3></div>
            </a>

            <a href="https://tiktok.com/@amilin_store" class="glass-card" target="_blank">
                <img src="https://c.termai.cc/i111/7DvQODC.png" class="icon-small">
                <div class="text-box"><h3>TIKTOK OFFICIAL</h3></div>
            </a>
        </div>

        <div class="footer">© 2026 AMILIN STORE - ALL RIGHTS RESERVED</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://cedeen.vercel.app/O8lW.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Auto Play on interaction (Biar tembus blokir browser)
        document.body.addEventListener('click', function() {
            var audio = document.getElementById('bgMusic');
            if (audio.paused) {
                audio.play();
            }
        }, { once: true });
    </script>

</body>
                </html>
